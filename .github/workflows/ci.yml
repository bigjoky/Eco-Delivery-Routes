name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install backend dependencies
        run: |
          if [ -f composer.json ]; then composer install --no-interaction --prefer-dist; else echo "composer.json pendiente"; fi
      - name: Backend tests
        run: |
          if [ -f artisan ]; then php artisan test; else echo "Laravel bootstrap pendiente"; fi

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install web dependencies
        run: npm install
      - name: Web lint
        run: npm run lint --if-present
      - name: Web test
        run: npm run test --if-present
      - name: Web build
        run: npm run build --if-present

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Android build
        run: |
          if [ -f gradlew ]; then ./gradlew :app:assembleDebug; else echo "Gradle wrapper pendiente"; fi

  apple-sharedcore:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/apple/SharedCore
    steps:
      - uses: actions/checkout@v4
      - name: SharedCore tests
        run: swift test

  apple-apps:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS
            project: apps/apple/EcoDeliveryRoutesMobile/EcoDeliveryRoutesMobile.xcodeproj
            scheme: EcoDeliveryRoutesMobile
            destination: generic/platform=iOS
          - name: macOS
            project: apps/apple/EcoDeliveryRoutesMac/EcoDeliveryRoutesMac.xcodeproj
            scheme: EcoDeliveryRoutesMac
            destination: generic/platform=macOS
          - name: tvOS
            project: apps/apple/EcoDeliveryRoutesTV/EcoDeliveryRoutesTV.xcodeproj
            scheme: EcoDeliveryRoutesTV
            destination: generic/platform=tvOS
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.name }}
        run: |
          xcodebuild \
            -project "${{ matrix.project }}" \
            -scheme "${{ matrix.scheme }}" \
            -destination "${{ matrix.destination }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
