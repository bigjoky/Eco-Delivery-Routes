components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  responses:
    Unauthorized:
      description: No autenticado
    Forbidden:
      description: No autorizado
  schemas:
    CreateShipmentRequest:
      type: object
      required: [hub_id, reference]
      properties:
        hub_id: { type: string, format: uuid }
        reference: { type: string }
        consignee_name: { type: string }
        address_line: { type: string }
        scheduled_at: { type: string, format: date-time }
    CreateRouteRequest:
      type: object
      required: [hub_id, code, route_date]
      properties:
        hub_id: { type: string, format: uuid }
        code: { type: string }
        route_date: { type: string, format: date }
        driver_id: { type: string, format: uuid }
        subcontractor_id: { type: string, format: uuid }
        vehicle_id: { type: string, format: uuid }
    UpdateRouteRequest:
      type: object
      properties:
        driver_id: { type: string, format: uuid, nullable: true }
        subcontractor_id: { type: string, format: uuid, nullable: true }
        vehicle_id: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [planned, in_progress, completed], nullable: true }
    CreateRouteStopRequest:
      type: object
      required: [sequence, stop_type]
      properties:
        sequence: { type: integer, minimum: 1 }
        stop_type: { type: string, enum: [DELIVERY, PICKUP] }
        shipment_id: { type: string, format: uuid, nullable: true }
        pickup_id: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [planned, in_progress, completed] }
        planned_at: { type: string, format: date-time, nullable: true }
    UpdateRouteStopRequest:
      type: object
      properties:
        sequence: { type: integer, minimum: 1, nullable: true }
        status: { type: string, enum: [planned, in_progress, completed], nullable: true }
        planned_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
    CreatePickupRequest:
      type: object
      required: [hub_id, reference, pickup_type]
      properties:
        hub_id: { type: string, format: uuid }
        reference: { type: string }
        pickup_type: { type: string, enum: [NORMAL, RETURN] }
        requester_name: { type: string }
        address_line: { type: string }
        scheduled_at: { type: string, format: date-time }
    CreateTrackingEventRequest:
      type: object
      required: [trackable_type, trackable_id, event_code, occurred_at]
      properties:
        trackable_type: { type: string, enum: [shipment, parcel, pickup] }
        trackable_id: { type: string, format: uuid }
        event_code: { type: string }
        status_to: { type: string }
        scan_code: { type: string }
        source: { type: string }
        metadata: { type: object, additionalProperties: true }
        occurred_at: { type: string, format: date-time }
    CreatePodRequest:
      type: object
      required: [evidenceable_type, evidenceable_id]
      properties:
        evidenceable_type: { type: string, enum: [shipment, pickup] }
        evidenceable_id: { type: string, format: uuid }
        signature_name: { type: string }
        photo_url: { type: string }
        geo_lat: { type: number }
        geo_lng: { type: number }
    CreateIncidentRequest:
      type: object
      required: [incidentable_type, incidentable_id, catalog_code, category]
      properties:
        incidentable_type: { type: string, enum: [shipment, pickup] }
        incidentable_id: { type: string, format: uuid }
        catalog_code: { type: string }
        category: { type: string, enum: [failed, absent, retry, general] }
        notes: { type: string }
    RecalculateQualityRequest:
      type: object
      required: [scope_type, scope_id, period_start, period_end]
      properties:
        scope_type: { type: string, enum: [driver, subcontractor, route] }
        scope_id: { type: string, format: uuid }
        period_start: { type: string, format: date }
        period_end: { type: string, format: date }
    DriverRouteMeResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            driver:
              type: object
              nullable: true
              properties:
                id: { type: string, format: uuid }
                code: { type: string }
                name: { type: string }
            route:
              type: object
              nullable: true
              additionalProperties: true
            stops:
              type: array
              items:
                $ref: '#/components/schemas/DriverRouteStop'
    DriverRouteStop:
      type: object
      required: [id, route_id, sequence, stop_type, status, entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        route_id: { type: string, format: uuid }
        sequence: { type: integer, minimum: 1 }
        stop_type: { type: string, enum: [DELIVERY, PICKUP] }
        status: { type: string }
        shipment_id: { type: string, format: uuid, nullable: true }
        pickup_id: { type: string, format: uuid, nullable: true }
        entity_type: { type: string, enum: [shipment, pickup] }
        entity_id: { type: string, format: uuid }
        reference: { type: string, nullable: true }
        planned_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
    CreateTariffRequest:
      type: object
      required: [service_type, amount_cents, currency, valid_from]
      properties:
        service_type: { type: string, enum: [delivery, pickup_normal, pickup_return] }
        amount_cents: { type: integer, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        valid_from: { type: string, format: date }
        valid_to: { type: string, format: date }
        hub_id: { type: string, format: uuid }
        subcontractor_id: { type: string, format: uuid }
        is_active: { type: boolean }
    CreateAdvanceRequest:
      type: object
      required: [subcontractor_id, amount_cents, currency, request_date]
      properties:
        subcontractor_id: { type: string, format: uuid }
        amount_cents: { type: integer, minimum: 1 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        reason: { type: string, maxLength: 160 }
        request_date: { type: string, format: date }
