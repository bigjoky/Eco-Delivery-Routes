openapi: 3.0.3
info:
  title: Eco Delivery Routes API
  version: 1.1.0
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                device_name: { type: string }
      responses:
        '200': { description: Login correcto }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/me:
    get:
      tags: [Auth]
      summary: Perfil del usuario autenticado
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesion y revocar token actual
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotar token de acceso
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users:
    get:
      tags: [Users]
      summary: Listar usuarios con filtros y paginacion
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [pending, active, suspended] }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: sort
          schema: { type: string, enum: [name, email, last_login_at, created_at], default: name }
        - in: query
          name: dir
          schema: { type: string, enum: [asc, desc], default: asc }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Users]
      summary: Crear usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, status]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                status: { type: string, enum: [pending, active, suspended] }
                role_ids:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '201': { description: Creado }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { description: Validación de consistencia hub/depot }

  /users/{id}:
    get:
      tags: [Users]
      summary: Detalle de usuario
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No encontrado }
    patch:
      tags: [Users]
      summary: Editar usuario
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, format: email }
                status: { type: string, enum: [pending, active, suspended] }
                password: { type: string, minLength: 8 }
      responses:
        '200': { description: Actualizado }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No encontrado }

  /users/{id}/roles:
    post:
      tags: [Users]
      summary: Asignar roles a usuario
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_ids]
              properties:
                role_ids:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No encontrado }

  /users/{id}/suspend:
    post:
      tags: [Users]
      summary: Suspender usuario
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No encontrado }
        '422': { description: Error de validacion de negocio }

  /users/{id}/reactivate:
    post:
      tags: [Users]
      summary: Reactivar usuario
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No encontrado }

  /users/{id}/reset-password:
    post:
      tags: [Users]
      summary: Restablecer password de usuario
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, minLength: 8 }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No encontrado }
        '422': { description: Validacion fallida }

  /roles:
    get:
      tags: [Roles]
      summary: Listar roles
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }

  /roles/{id}:
    get:
      tags: [Roles]
      summary: Detalle de rol con permisos
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No encontrado }

  /roles/{id}/permissions:
    put:
      tags: [Roles]
      summary: Asignar permisos a rol
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permission_ids]
              properties:
                permission_ids:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '200': { description: Actualizado }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No encontrado }

  /driver/me/route:
    get:
      tags: [Driver]
      summary: Obtener ruta actual del driver autenticado con paradas
      parameters:
        - in: query
          name: route_date
          schema: { type: string, format: date }
        - in: query
          name: status
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverRouteMeResponse'
        '403': { $ref: '#/components/responses/Forbidden' }

  /dashboard/overview:
    get:
      tags: [Dashboard]
      summary: Vista agregada operativa con alertas y productividad
      parameters:
        - in: query
          name: period
          schema: { type: string, enum: [today, 7d, 30d], default: 7d }
        - in: query
          name: date_from
          schema: { type: string, format: date }
        - in: query
          name: date_to
          schema: { type: string, format: date }
        - in: query
          name: hub_id
          schema: { type: string, format: uuid }
        - in: query
          name: subcontractor_id
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }

  /dashboard/overview/export.csv:
    get:
      tags: [Dashboard]
      summary: Exportar overview agregado a CSV
      parameters:
        - in: query
          name: period
          schema: { type: string, enum: [today, 7d, 30d], default: 7d }
        - in: query
          name: date_from
          schema: { type: string, format: date }
        - in: query
          name: date_to
          schema: { type: string, format: date }
        - in: query
          name: hub_id
          schema: { type: string, format: uuid }
        - in: query
          name: subcontractor_id
          schema: { type: string, format: uuid }
      responses:
        '200': { description: CSV export }
        '403': { $ref: '#/components/responses/Forbidden' }

  /dashboard/overview/export.pdf:
    get:
      tags: [Dashboard]
      summary: Exportar overview agregado a PDF
      parameters:
        - in: query
          name: period
          schema: { type: string, enum: [today, 7d, 30d], default: 7d }
        - in: query
          name: date_from
          schema: { type: string, format: date }
        - in: query
          name: date_to
          schema: { type: string, format: date }
        - in: query
          name: hub_id
          schema: { type: string, format: uuid }
        - in: query
          name: subcontractor_id
          schema: { type: string, format: uuid }
      responses:
        '200': { description: PDF export }
        '403': { $ref: '#/components/responses/Forbidden' }

  /audit-logs:
    get:
      tags: [Audit]
      summary: Listar auditoria filtrable por recurso
      parameters:
        - in: query
          name: resource
          schema: { type: string, enum: [settlement, adjustment, advance, tariff, quality_threshold, user, role, subcontractor, driver, vehicle, route, shipment, incident, workforce, compliance_document, vehicle_control] }
        - in: query
          name: id
          schema: { type: string, format: uuid }
        - in: query
          name: event
          schema: { type: string }
        - in: query
          name: actor
          schema: { type: string, description: "Nombre parcial o actor_user_id" }
        - in: query
          name: date_from
          schema: { type: string, format: date }
        - in: query
          name: date_to
          schema: { type: string, format: date }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }

  /audit-logs/export.csv:
    get:
      tags: [Audit]
      summary: Exportar auditoria filtrada a CSV
      parameters:
        - in: query
          name: resource
          schema: { type: string, enum: [settlement, adjustment, advance, tariff, quality_threshold, user, role, subcontractor, driver, vehicle, route, shipment, incident, workforce, compliance_document, vehicle_control] }
        - in: query
          name: id
          schema: { type: string, format: uuid }
        - in: query
          name: event
          schema: { type: string }
        - in: query
          name: actor
          schema: { type: string, description: "Nombre parcial o actor_user_id" }
        - in: query
          name: date_from
          schema: { type: string, format: date }
        - in: query
          name: date_to
          schema: { type: string, format: date }
      responses:
        '200': { description: CSV export }
        '403': { $ref: '#/components/responses/Forbidden' }

  /tariffs:
    get:
      tags: [Tariffs]
      summary: Listar tarifas
      parameters:
        - in: query
          name: service_type
          schema: { type: string, enum: [delivery, pickup_normal, pickup_return] }
        - in: query
          name: hub_id
          schema: { type: string, format: uuid }
        - in: query
          name: subcontractor_id
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
    post:
      tags: [Tariffs]
      summary: Crear tarifa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTariffRequest'
      responses:
        '201': { description: Creado }

  /hubs:
    get:
      tags: [Operations]
      summary: Listar hubs (activos por defecto)
      parameters:
        - in: query
          name: only_active
          schema: { type: boolean, default: true }
        - in: query
          name: include_deleted
          schema: { type: boolean, default: false }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Hubs]
      summary: Crear hub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, city]
              properties:
                code: { type: string }
                name: { type: string }
                city: { type: string }
                is_active: { type: boolean }
      responses:
        '201': { description: Creado }
        '403': { $ref: '#/components/responses/Forbidden' }

  /tariffs/{id}:
    patch:
      tags: [Tariffs]
      summary: Editar tarifa existente
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount_cents: { type: integer, minimum: 0 }
                currency: { type: string, minLength: 3, maxLength: 3 }
                valid_from: { type: string, format: date }
                valid_to: { type: string, format: date }
                is_active: { type: boolean }
      responses:
        '200': { description: Actualizado }
        '404': { description: Tarifa no encontrada }

  /advances:
    get:
      tags: [Advances]
      summary: Listar anticipos
      parameters:
        - in: query
          name: subcontractor_id
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { type: string, enum: [requested, approved, rejected, deducted] }
        - in: query
          name: period
          schema: { type: string, example: "2026-02" }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - in: query
          name: sort
          schema: { type: string, enum: [request_date, created_at, amount_cents, status] }
        - in: query
          name: dir
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        '200': { description: OK }
    post:
      tags: [Advances]
      summary: Crear anticipo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdvanceRequest'
      responses:
        '201': { description: Creado }

  /advances/export.csv:
    get:
      tags: [Advances]
      summary: Exportar anticipos filtrados a CSV
      parameters:
        - in: query
          name: subcontractor_id
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { type: string, enum: [requested, approved, rejected, deducted] }
        - in: query
          name: period
          schema: { type: string, example: "2026-02" }
      responses:
        '200': { description: CSV export }

  /advances/{id}:
    patch:
      tags: [Advances]
      summary: Editar anticipo en estado requested
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount_cents: { type: integer, minimum: 1 }
                currency: { type: string, minLength: 3, maxLength: 3 }
                reason: { type: string, maxLength: 160 }
                request_date: { type: string, format: date }
      responses:
        '200': { description: Actualizado }
        '404': { description: Anticipo no encontrado }
        '422': { description: Estado invalido para edicion }

  /advances/{id}/approve:
    post:
      tags: [Advances]
      summary: Aprobar anticipo
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Aprobado }
        '404': { description: Anticipo no encontrado }
        '422': { description: Estado invalido para aprobacion }

  /tariffs/current:
    get:
      tags: [Tariffs]
      summary: Obtener tarifas vigentes por tipo de servicio
      parameters:
        - in: query
          name: hub_id
          schema: { type: string, format: uuid }
        - in: query
          name: subcontractor_id
          schema: { type: string, format: uuid }
        - in: query
          name: on_date
          schema: { type: string, format: date }
      responses:
        '200': { description: OK }

  /settlements/preview:
    get:
      tags: [Settlements]
      summary: Previsualizar liquidacion mensual de subcontrata
      parameters:
        - in: query
          name: subcontractor_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: period
          required: true
          schema: { type: string, example: "2026-02" }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Subcontrata no encontrada }

  /subcontractors:
    get:
      tags: [Settlements]
      summary: Busqueda rapida de subcontratas para filtros operativos y de liquidacion
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Ops]
      summary: Crear subcontrata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [legal_name, tax_id]
              properties:
                legal_name: { type: string, maxLength: 180 }
                tax_id: { type: string, maxLength: 60 }
                status: { type: string, enum: [active, inactive, suspended] }
                payment_terms: { type: string, maxLength: 80 }
      responses:
        '201': { description: Creado }
        '403': { $ref: '#/components/responses/Forbidden' }

  /subcontractors/{id}:
    patch:
      tags: [Ops]
      summary: Actualizar subcontrata
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                legal_name: { type: string, maxLength: 180 }
                tax_id: { type: string, nullable: true, maxLength: 60 }
                status: { type: string, enum: [active, inactive, suspended] }
                payment_terms: { type: string, maxLength: 80 }
      responses:
        '200': { description: Actualizado }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No encontrado }
    delete:
      tags: [Ops]
      summary: Eliminar subcontrata (solo si no tiene recursos vinculados)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Eliminado }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No encontrado }
        '409': { description: Conflicto por recursos vinculados }

  /subcontractors/bulk-status:
    post:
      tags: [Ops]
      summary: Actualizar estado masivo de subcontratas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, status]
              properties:
                ids:
                  type: array
                  minItems: 1
                  items: { type: string, format: uuid }
                status: { type: string, enum: [active, inactive, suspended] }
      responses:
        '200': { description: Actualizado }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { description: Validation error }

  /drivers:
    get:
      tags: [Ops]
      summary: Listar drivers
      parameters:
        - in: query
          name: subcontractor_id
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Ops]
      summary: Crear driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, dni]
              properties:
                code: { type: string, maxLength: 60, nullable: true }
                dni: { type: string, maxLength: 40 }
                name: { type: string, maxLength: 120 }
                status: { type: string, enum: [active, inactive, suspended] }
                employment_type: { type: string, enum: [employee, subcontractor] }
                user_id: { type: string, format: uuid, nullable: true }
                subcontractor_id: { type: string, format: uuid, nullable: true }
                home_hub_id: { type: string, format: uuid, nullable: true }
      responses:
        '201': { description: Creado }
        '403': { $ref: '#/components/responses/Forbidden' }

  /drivers/{id}:
    patch:
      tags: [Ops]
      summary: Actualizar driver
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 120 }
                dni: { type: string, maxLength: 40 }
                status: { type: string, enum: [active, inactive, suspended] }
                employment_type: { type: string, enum: [employee, subcontractor] }
                user_id: { type: string, format: uuid, nullable: true }
                subcontractor_id: { type: string, format: uuid, nullable: true }
                home_hub_id: { type: string, format: uuid, nullable: true }
      responses:
        '200': { description: Actualizado }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No encontrado }
    delete:
      tags: [Ops]
      summary: Eliminar driver (solo si no tiene recursos vinculados)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Eliminado }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No encontrado }
        '409': { description: Conflicto por recursos vinculados }

  /drivers/bulk-status:
    post:
      tags: [Ops]
      summary: Actualizar estado masivo de conductores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, status]
              properties:
                ids:
                  type: array
                  minItems: 1
                  items: { type: string, format: uuid }
                status: { type: string, enum: [active, inactive, suspended] }
      responses:
        '200': { description: Actualizado }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { description: Validation error }

  /vehicles:
    get:
      tags: [Ops]
      summary: Listar vehiculos
      parameters:
        - in: query
          name: subcontractor_id
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Ops]
      summary: Crear vehiculo
      requestBody:
        required: true
        content:
          application/json:
            schema:
