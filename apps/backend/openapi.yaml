          schema: { type: string, format: date }
        - in: query
          name: scope_type
          schema: { type: string, enum: [global, role, user, route, subcontractor] }
        - in: query
          name: scope_id
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }

  /kpis/quality/threshold/history/export.csv:
    get:
      tags: [Quality]
      summary: Exportar historial de cambios de umbral KPI a CSV
      parameters:
        - in: query
          name: scope_type
          schema: { type: string, enum: [global, role, user] }
        - in: query
          name: scope_id
          schema: { type: string, description: "role code o user id" }
        - in: query
          name: date_from
          schema: { type: string, format: date }
        - in: query
          name: date_to
          schema: { type: string, format: date }
      responses:
        '200': { description: CSV export }
        '403': { $ref: '#/components/responses/Forbidden' }

  /kpis/quality/threshold/history/export.pdf:
    get:
      tags: [Quality]
      summary: Exportar historial de cambios de umbral KPI a PDF
      parameters:
        - in: query
          name: scope_type
          schema: { type: string, enum: [global, role, user] }
        - in: query
          name: scope_id
          schema: { type: string, description: "role code o user id" }
        - in: query
          name: date_from
          schema: { type: string, format: date }
        - in: query
          name: date_to
          schema: { type: string, format: date }
      responses:
        '200': { description: PDF export }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  responses:
    Unauthorized:
      description: No autenticado
    Forbidden:
      description: No autorizado
  schemas:
    CreateShipmentRequest:
      type: object
      required: [hub_id]
      properties:
        hub_id: { type: string, format: uuid }
        external_reference: { type: string }
        consignee_name: { type: string }
        consignee_document_id: { type: string }
        address_line: { type: string }
        address_street: { type: string }
        address_number: { type: string }
        postal_code: { type: string }
        city: { type: string }
        province: { type: string }
        country: { type: string }
        address_notes: { type: string }
        consignee_phone: { type: string }
        consignee_phone_alt: { type: string }
        consignee_email: { type: string, format: email }
        sender_name: { type: string }
        sender_legal_name: { type: string }
        sender_document_id: { type: string }
        sender_phone: { type: string }
        sender_phone_alt: { type: string }
        sender_email: { type: string, format: email }
        sender_address_line: { type: string }
        sender_address_street: { type: string }
        sender_address_number: { type: string }
        sender_postal_code: { type: string }
        sender_city: { type: string }
        sender_province: { type: string }
        sender_country: { type: string }
        sender_address_notes: { type: string }
        scheduled_at: { type: string, format: date }
        service_type:
          type: string
          enum: [express_1030, express_1400, express_1900, economy_parcel, business_parcel, thermo_parcel, delivery]
    ShipmentDetailResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            shipment:
              type: object
              properties:
                id: { type: string, format: uuid }
                hub_id: { type: string, format: uuid }
                hub_code: { type: string, nullable: true }
                route_id: { type: string, format: uuid, nullable: true }
                assigned_driver_id: { type: string, format: uuid, nullable: true }
                subcontractor_id: { type: string, format: uuid, nullable: true }
                reference: { type: string }
                external_reference: { type: string, nullable: true }
                service_type: { type: string }
                status: { type: string }
                consignee_name: { type: string, nullable: true }
                consignee_document_id: { type: string, nullable: true }
                address_line: { type: string, nullable: true }
                address_street: { type: string, nullable: true }
                address_number: { type: string, nullable: true }
                postal_code: { type: string, nullable: true }
                city: { type: string, nullable: true }
                province: { type: string, nullable: true }
                country: { type: string, nullable: true }
                address_notes: { type: string, nullable: true }
                consignee_phone: { type: string, nullable: true }
                consignee_email: { type: string, format: email, nullable: true }
                scheduled_at: { type: string, format: date-time, nullable: true }
                delivered_at: { type: string, format: date-time, nullable: true }
                created_at: { type: string, format: date-time }
                updated_at: { type: string, format: date-time }
            tracking_events:
              type: array
              items:
                type: object
                properties:
                  id: { type: integer }
                  trackable_type: { type: string, enum: [shipment, pickup, parcel] }
                  trackable_id: { type: string, format: uuid }
                  event_code: { type: string }
                  status_to: { type: string, nullable: true }
                  scan_code: { type: string, nullable: true }
                  source: { type: string }
                  metadata: { type: object, nullable: true }
                  occurred_at: { type: string, format: date-time }
            pods:
              type: array
              items:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  evidenceable_type: { type: string, enum: [shipment, pickup] }
                  evidenceable_id: { type: string, format: uuid }
                  signature_name: { type: string, nullable: true }
                  photo_url: { type: string, nullable: true }
                  geo_lat: { type: number, format: float, nullable: true }
                  geo_lng: { type: number, format: float, nullable: true }
                  captured_at: { type: string, format: date-time }
            incidents:
              type: array
              items:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  incidentable_type: { type: string, enum: [shipment, pickup] }
                  incidentable_id: { type: string, format: uuid }
                  catalog_code: { type: string }
                  category: { type: string }
                  notes: { type: string, nullable: true }
                  resolved_at: { type: string, format: date-time, nullable: true }
                  created_at: { type: string, format: date-time }
            route_stops:
              type: array
              items:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  route_id: { type: string, format: uuid }
                  route_code: { type: string, nullable: true }
                  route_date: { type: string, format: date, nullable: true }
                  sequence: { type: integer }
                  stop_type: { type: string, enum: [DELIVERY, PICKUP] }
                  status: { type: string }
                  planned_at: { type: string, format: date-time, nullable: true }
                  completed_at: { type: string, format: date-time, nullable: true }
    CreateRouteRequest:
      type: object
      required: [hub_id, code, route_date]
      properties:
        hub_id: { type: string, format: uuid }
        code: { type: string }
        route_date: { type: string, format: date }
        driver_id: { type: string, format: uuid }
        subcontractor_id: { type: string, format: uuid }
        vehicle_id: { type: string, format: uuid }
    UpdateRouteRequest:
      type: object
      properties:
        driver_id: { type: string, format: uuid, nullable: true }
        subcontractor_id: { type: string, format: uuid, nullable: true }
        vehicle_id: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [planned, in_progress, completed], nullable: true }
    CreateRouteBulkTemplateRequest:
      type: object
      required: [name]
      properties:
        route_id: { type: string, format: uuid, nullable: true }
        name: { type: string, maxLength: 120 }
        status: { type: string, enum: [planned, in_progress, completed], nullable: true }
        planned_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        shift_minutes: { type: integer, minimum: -1440, maximum: 1440 }
    UpdateRouteBulkTemplateRequest:
      type: object
      properties:
        name: { type: string, maxLength: 120, nullable: true }
        status: { type: string, enum: [planned, in_progress, completed], nullable: true }
        planned_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        shift_minutes: { type: integer, minimum: -1440, maximum: 1440 }
    UpdateRouteManifestRequest:
      type: object
      properties:
        manifest_notes: { type: string, nullable: true }
    CreateRouteStopRequest:
      type: object
      required: [sequence, stop_type]
      properties:
        sequence: { type: integer, minimum: 1 }
        stop_type: { type: string, enum: [DELIVERY, PICKUP] }
        shipment_id: { type: string, format: uuid, nullable: true }
        pickup_id: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [planned, in_progress, completed] }
        planned_at: { type: string, format: date-time, nullable: true }
        undo_of_stop_id: { type: string, format: uuid, nullable: true }
    UpdateRouteStopRequest:
      type: object
      properties:
        sequence: { type: integer, minimum: 1, nullable: true }
        status: { type: string, enum: [planned, in_progress, completed], nullable: true }
        planned_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
    BulkUpdateShipmentsRequest:
      type: object
      required: [reason]
      properties:
        shipment_ids:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
        apply_to_filtered: { type: boolean, default: false }
        filter_status:
          type: string
          enum: [created, out_for_delivery, delivered, incident]
        filter_hub_id: { type: string, format: uuid }
        filter_q: { type: string, maxLength: 120 }
        filter_scheduled_from: { type: string, format: date }
        filter_scheduled_to: { type: string, format: date }
        status:
          type: string
          enum: [created, out_for_delivery, delivered, incident]
        hub_id: { type: string, format: uuid }
        scheduled_at: { type: string, format: date-time }
        reason_code: { type: string, maxLength: 80 }
        reason_detail: { type: string, maxLength: 220 }
        reason: { type: string, maxLength: 220 }
    CreatePickupRequest:
      type: object
      required: [hub_id, reference, pickup_type]
      properties:
        hub_id: { type: string, format: uuid }
        reference: { type: string }
        pickup_type: { type: string, enum: [NORMAL, RETURN] }
        requester_name: { type: string }
        address_line: { type: string }
        scheduled_at: { type: string, format: date-time }
    CreateTrackingEventRequest:
      type: object
      required: [trackable_type, trackable_id, event_code, occurred_at]
      properties:
        trackable_type: { type: string, enum: [shipment, parcel, pickup] }
        trackable_id: { type: string, format: uuid }
        event_code: { type: string }
        status_to: { type: string }
        scan_code: { type: string }
        source: { type: string }
        metadata: { type: object, additionalProperties: true }
        occurred_at: { type: string, format: date-time }
    CreatePodRequest:
      type: object
      required: [evidenceable_type, evidenceable_id]
      properties:
        evidenceable_type: { type: string, enum: [shipment, pickup] }
        evidenceable_id: { type: string, format: uuid }
        signature_name: { type: string }
        photo_url: { type: string }
        geo_lat: { type: number }
        geo_lng: { type: number }
    CreateIncidentRequest:
      type: object
      required: [incidentable_type, incidentable_id, catalog_code, category]
      properties:
        incidentable_type: { type: string, enum: [shipment, pickup] }
        incidentable_id: { type: string, format: uuid }
        catalog_code: { type: string }
        category: { type: string, enum: [failed, absent, retry, general] }
        notes: { type: string }
    RecalculateQualityRequest:
      type: object
      required: [scope_type, scope_id, period_start, period_end]
      properties:
        scope_type: { type: string, enum: [driver, subcontractor, route] }
        scope_id: { type: string, format: uuid }
        period_start: { type: string, format: date }
        period_end: { type: string, format: date }
    DriverRouteMeResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            driver:
              type: object
              nullable: true
              properties:
                id: { type: string, format: uuid }
                code: { type: string }
                name: { type: string }
            route:
              type: object
              nullable: true
              additionalProperties: true
            stops:
              type: array
              items:
                $ref: '#/components/schemas/DriverRouteStop'
    DriverRouteStop:
      type: object
      required: [id, route_id, sequence, stop_type, status, entity_type, entity_id]
      properties:
        id: { type: string, format: uuid }
        route_id: { type: string, format: uuid }
        sequence: { type: integer, minimum: 1 }
        stop_type: { type: string, enum: [DELIVERY, PICKUP] }
        status: { type: string }
        shipment_id: { type: string, format: uuid, nullable: true }
        pickup_id: { type: string, format: uuid, nullable: true }
        entity_type: { type: string, enum: [shipment, pickup] }
        entity_id: { type: string, format: uuid }
        reference: { type: string, nullable: true }
        planned_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
    CreateTariffRequest:
      type: object
      required: [service_type, amount_cents, currency, valid_from]
      properties:
        service_type: { type: string, enum: [delivery, pickup_normal, pickup_return] }
        amount_cents: { type: integer, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        valid_from: { type: string, format: date }
        valid_to: { type: string, format: date }
        hub_id: { type: string, format: uuid }
        subcontractor_id: { type: string, format: uuid }
        is_active: { type: boolean }
    CreateAdvanceRequest:
      type: object
      required: [subcontractor_id, amount_cents, currency, request_date]
      properties:
        subcontractor_id: { type: string, format: uuid }
        amount_cents: { type: integer, minimum: 1 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        reason: { type: string, maxLength: 160 }
        request_date: { type: string, format: date }
